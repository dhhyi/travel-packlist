# yaml-language-server: $schema=https://raw.githubusercontent.com/dhhyi/devcontainer-creator/dist/language_schema.json
extends: dcc://javascript-pnpm
devcontainer:
  name: travel-packlist
  build:
    packages:
      - exiftool
      - imagemagick
      - xdg-utils
      - bc
      - x11-utils
    user:
      - ENV NX_TUI=false NX_NO_CLOUD=true GIT_DIFF_IMAGE_ENABLED=1 MISE_ENV=development
      - ENV PATH="$HOME/.local/share/mise/shims:$PATH"
      - RUN git clone https://github.com/ewanmellor/git-diff-image.git /tmp/git-diff-image
      - RUN mise use -g 'npm:@playwright/test@1.58.2'
      - RUN playwright install chromium --with-deps
    files:
      - type: script
        path: /usr/bin/nx
        content: |
          #!/bin/bash
          exec pnpm exec nx "$@"
  publish:
    image: ghcr.io/dhhyi/travel-packlist-devcontainer
  instantiate: fish -c 'pnpm install && if ! set -q CI; cd /tmp/git-diff-image && ./install.sh; end'
  ports:
    - 4200
extras:
  - named-volumes
  - tmux
namedVolumes:
  node_modules: travel-packlist-node-modules
  $HOME/.cache/pnpm: pnpm-store
  $HOME/.cache/ms-playwright: playwright-cache
vscode:
  extensions:
    - angular.ng-template
    - tomwhite007.rename-angular-component
    - esbenp.prettier-vscode
    - bradlc.vscode-tailwindcss
    - streetsidesoftware.code-spell-checker
    - bierner.markdown-preview-github-styles
    - bierner.markdown-mermaid
    - github.vscode-github-actions
    - yzhang.markdown-all-in-one
    - peggyjs.peggy-language
    - nrwl.angular-console
    - firsttris.vscode-jest-runner
    - ms-playwright.playwright
    - redhat.vscode-yaml
    - aaron-bond.better-comments
    - peakchen90.open-html-in-browser
  settings:
    editor.defaultFormatter: esbenp.prettier-vscode
    tailwindCSS.classAttributes:
      - class
      - ngClass
      - routerLinkActive
      - animate.enter
      - animate.leave
    tailwindCSS.includeLanguages:
      typescript: css
    nxConsole.showProjectDetailsView: false
    files.associations:
      '**/whatsnew-*': 'plaintext'
