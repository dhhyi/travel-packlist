@if (!questions().length) {
  @if (rulesMode() === 'local') {
    <div class="flex flex-col items-center">
      <p class="text-center" i18n>
        No questions available, please
        <button
          type="button"
          class="link inline p-0 underline"
          (click)="goToRulesEdit()"
        >
          create
        </button>
        some.
      </p>
    </div>
  }
} @else {
  <div>
    @for (question of displayQuestions(); track question.question) {
      <div
        class="card flex flex-row items-center justify-between overflow-hidden not-last:mb-1"
        role="checkbox"
        tabindex="0"
        [animate.enter]="enterAnimation()"
        [animate.leave]="leaveAnimation()"
        [attr.aria-checked]="question.isActive"
        [attr.aria-disabled]="isAnswersLockActive()"
        [attr.aria-label]="question.question"
        [class.disabled]="isAnswersLockActive()"
        (click)="toggleQuestion(question.variable)"
        (keypress)="toggleQuestion(question.variable)"
      >
        <span aria-hidden="true" class="font-bold select-none">{{
          question.question
        }}</span>
        @if (question.isActive) {
          <app-icon-checkmark />
        }
      </div>
    }
  </div>
}
